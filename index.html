<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENDER PRESTAMISTA | Control de Activos</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --deep-bg: #000814;
            --panel-bg: rgba(0, 20, 40, 0.9);
            --success: #00ffaa;
            --danger: #ff4444;
            --warning: #ffcc00;
        }

        body {
            background-color: var(--deep-bg);
            background-image: radial-gradient(circle, #001a33 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--neon-blue);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            background: var(--panel-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-top: 0;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .system-status {
            text-align: center;
            font-size: 0.8rem;
            margin-bottom: 30px;
            color: #fff;
            text-transform: uppercase;
        }

        /* PANEL DE CONTROL (ADMIN) */
        #admin-panel {
            display: none;
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid var(--neon-blue);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        input, select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-blue);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            outline: none;
        }

        button {
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 12px 25px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        /* TABLA DE REGISTROS */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: rgba(0, 212, 255, 0.15);
            padding: 15px;
            border-bottom: 2px solid var(--neon-blue);
            font-size: 0.9rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.1);
            font-size: 1rem;
        }

        tr:hover { background: rgba(0, 212, 255, 0.05); }

        /* ETIQUETAS DE ESTADO */
        .badge {
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .bg-pending { border: 1px solid var(--warning); color: var(--warning); }
        .bg-paid { border: 1px solid var(--success); color: var(--success); }

        .btn-delete { background: var(--danger); color: white; padding: 5px 10px; font-size: 0.7rem; }
        .btn-status { background: #555; color: white; padding: 5px 10px; font-size: 0.7rem; margin-right: 5px; }

        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="main-container">
    <h1>ENDER PRESTAMISTA</h1>
    <div class="system-status">Terminal de Gestión | Moneda: Bs.VE</div>

    <div id="admin-panel">
        <h3 style="margin-top: 0;">🛠️ REGISTRAR NUEVA OPERACIÓN</h3>
        <div class="form-grid">
            <input type="text" id="nombre" placeholder="Nombre Estudiante">
            <input type="number" id="monto" placeholder="Monto Base (Bs)">
            <input type="number" id="interes" placeholder="Interés % (Ej: 10)">
            <button onclick="guardar()">CARGAR EN BASE DE DATOS</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>FECHA</th>
                    <th>ESTUDIANTE</th>
                    <th>MONTO (Bs)</th>
                    <th>TOTAL</th>
                    <th>ESTADO</th>
                    <th class="admin-only" style="display:none;">ACCIONES</th>
                </tr>
            </thead>
            <tbody id="datos-tabla">
                </tbody>
        </table>
    </div>

    <div class="footer">
        <div>
            <strong>TOTAL EN CALLE:</strong> <span id="resumen-total">0.00</span> Bs.
        </div>
        <button onclick="activarAdmin()" style="background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);">🔑 ACCESO ADMIN</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ender_db')) || [];

    function activarAdmin() {
        const panel = document.getElementById('admin-panel');
        const acciones = document.querySelectorAll('.admin-only');
        const estaOculto = panel.style.display === 'none' || panel.style.display === '';
        
        panel.style.display = estaOculto ? 'block' : 'none';
        acciones.forEach(el => el.style.display = estaOculto ? 'table-cell' : 'none');
        render();
    }

    function guardar() {
        const nom = document.getElementById('nombre').value;
        const m = parseFloat(document.getElementById('monto').value);
        const i = parseFloat(document.getElementById('interes').value || 0);
        
        if (nom && m) {
            const fecha = new Date().toLocaleDateString();
            const total = m + (m * (i / 100));
            db.push({ fecha, nom, m, total, pagado: false });
            localStorage.setItem('ender_db', JSON.stringify(db));
            limpiarInputs();
            render();
        }
    }

    function limpiarInputs() {
        document.getElementById('nombre').value = '';
        document.getElementById('monto').value = '';
        document.getElementById('interes').value = '';
    }

    function cambiarEstado(index) {
        db[index].pagado = !db[index].pagado;
        localStorage.setItem('ender_db', JSON.stringify(db));
        render();
    }

    function borrar(index) {
        if(confirm("¿Eliminar este registro permanentemente?")) {
            db.splice(index, 1);
            localStorage.setItem('ender_db', JSON.stringify(db));
            render();
        }
    }

    function render() {
        const tabla = document.getElementById('datos-tabla');
        const adminVis = document.getElementById('admin-panel').style.display === 'block';
        let sumaTotal = 0;
        tabla.innerHTML = '';

        db.forEach((p, i) => {
            if(!p.pagado) sumaTotal += p.total;
            
            tabla.innerHTML += `
                <tr>
                    <td>${p.fecha}</td>
                    <td style="color:#fff">${p.nom}</td>
                    <td>${p.m.toFixed(2)}</td>
                    <td style="font-weight:bold">${p.total.toFixed(2)}</td>
                    <td>
                        <span class="badge ${p.pagado ? 'bg-paid' : 'bg-pending'}">
                            ${p.pagado ? 'PAGADO' : 'PENDIENTE'}
                        </span>
                    </td>
                    <td class="admin-only" style="display:${adminVis ? 'table-cell' : 'none'}">
                        <button class="btn-status" onclick="cambiarEstado(${i})">✓</button>
                        <button class="btn-delete" onclick="borrar(${i})">X</button>
                    </td>
                </tr>
            `;
        });
        document.getElementById('resumen-total').innerText = sumaTotal.toFixed(2);
    }

    render();
</script>

</body>
</html>
