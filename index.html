<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Ender-IA Permanente</title>
    <style>
        body { background: #000; color: #00ff41; font-family: monospace; padding: 20px; text-align: center; }
        .box { border: 2px solid #00ff41; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; }
        #log { height: 250px; overflow-y: auto; text-align: left; margin-bottom: 10px; border-bottom: 1px solid #111; }
        input { width: 100%; background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🌌 ENDER-IA CORE</h3>
        <div id="log">>>> Sistema listo. Esperando núcleo...</div>
        <input type="text" id="in" placeholder="Escribe aquí..." onkeypress="if(event.key==='Enter') enviar()">
    </div>

    <script>
        // ESTA FUNCIÓN BUSCA EL LINK DE COLAB EN TU GITHUB AUTOMÁTICAMENTE
        async function enviar() {
            const input = document.getElementById('in');
            const log = document.getElementById('log');
            const pregunta = input.value;
            if(!pregunta) return;

            log.innerHTML += `<div><b>Tú:</b> ${pregunta}</div>`;
            input.value = "";

            try {
                // 1. LEER EL LINK ACTUAL DESDE UN ARCHIVO EXTERNO (Sin Firebase)
                // Reemplaza "USUARIO" por tu nombre de GitHub
                const resLink = await fetch("https://raw.githubusercontent.com/USUARIO/Ender-IA/main/api_link.txt");
                const API_URL = await resLink.text();

                // 2. ENVIAR LA PREGUNTA
                const response = await fetch(API_URL.trim(), {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ "pregunta": pregunta })
                });
                const data = await response.json();
                log.innerHTML += `<div style="color:#00ff41"><b>IA:</b> ${data.respuesta}</div>`;
            } catch (e) {
                log.innerHTML += `<div style="color:red">ERROR: El núcleo no está encendido en Colab.</div>`;
            }
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
  </html>
