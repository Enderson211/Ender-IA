<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ender Prestamista | Sistema Local</title>
    <style>
        :root { --neon: #00d4ff; --bg: #000b1a; --panel: rgba(0, 30, 60, 0.9); }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        /* Contenedor Estilo Tablet */
        .frame { max-width: 900px; margin: auto; border: 2px solid var(--neon); border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0,212,255,0.2); background: var(--panel); }
        
        h1 { text-align: center; letter-spacing: 5px; text-transform: uppercase; border-bottom: 2px solid var(--neon); padding-bottom: 10px; }
        
        /* Formulario oculto para el dueño (TÚ) */
        #admin-panel { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; border: 1px dashed var(--neon); }
        input { background: transparent; border: 1px solid var(--neon); color: white; padding: 8px; margin: 5px; border-radius: 4px; }
        button { background: var(--neon); color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* Tabla Estilizada */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #004466; color: white; padding: 12px; border: 1px solid var(--neon); }
        td { padding: 10px; border: 1px solid #006699; text-align: center; }
        .btn-del { background: #ff4444; color: white; border: none; padding: 5px; cursor: pointer; }

        .footer-tools { margin-top: 20px; text-align: right; }
    </style>
</head>
<body>

<div class="frame">
    <h1>ENDER PRESTAMISTA</h1>
    <p style="text-align: center; font-size: 0.8rem;">SISTEMA DE GESTIÓN DE ACTIVOS (Bs.VE)</p>

    <div id="admin-panel">
        <h3>MODO ADMINISTRADOR: AGREGAR PRÉSTAMO</h3>
        <input type="text" id="nombre" placeholder="Nombre Estudiante">
        <input type="number" id="monto" placeholder="Monto (Bs)">
        <input type="number" id="interes" placeholder="Interés %">
        <button onclick="agregarPrestamo()">GUARDAR EN SISTEMA</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ESTUDIANTE</th>
                <th>MONTO</th>
                <th>INTERÉS</th>
                <th>TOTAL A PAGAR</th>
                <th id="th-accion" style="display:none;">ACCIÓN</th>
            </tr>
        </thead>
        <tbody id="lista-prestamos"></tbody>
    </table>

    <div class="footer-tools">
        <button onclick="toggleAdmin()">🔑 ENTRAR COMO ENDER</button>
    </div>
</div>

<script>
    let prestamos = JSON.parse(localStorage.getItem('mis_prestamos')) || [];

    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        const th = document.getElementById('th-accion');
        const isVisible = panel.style.display === 'block';
        panel.style.display = isVisible ? 'none' : 'block';
        th.style.display = isVisible ? 'none' : 'table-cell';
        renderizar();
    }

    function agregarPrestamo() {
        const nombre = document.getElementById('nombre').value;
        const monto = parseFloat(document.getElementById('monto').value);
        const interes = parseFloat(document.getElementById('interes').value);
        
        if(nombre && monto) {
            const total = monto + (monto * (interes/100));
            prestamos.push({ nombre, monto, interes, total });
            localStorage.setItem('mis_prestamos', JSON.stringify(prestamos));
            renderizar();
            alert("Prestamo registrado exitosamente.");
        }
    }

    function borrarPrestamo(index) {
        prestamos.splice(index, 1);
        localStorage.setItem('mis_prestamos', JSON.stringify(prestamos));
        renderizar();
    }

    function renderizar() {
        const tabla = document.getElementById('lista-prestamos');
        const isAdmin = document.getElementById('admin-panel').style.display === 'block';
        tabla.innerHTML = '';

        prestamos.forEach((p, index) => {
            tabla.innerHTML += `
                <tr>
                    <td>${p.nombre}</td>
                    <td>${p.monto} Bs</td>
                    <td>${p.interes}%</td>
                    <td style="color: #00ffaa; font-weight: bold;">${p.total} Bs</td>
                    ${isAdmin ? `<td><button class="btn-del" onclick="borrarPrestamo(${index})">X</button></td>` : ''}
                </tr>
            `;
        });
    }

    renderizar(); // Cargar datos al abrir
</script>

</body>
</html>
