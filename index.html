<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EnderStudio | Hub</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>ENDER<span>STUDIO</span></h1>
        <div class="status-bar">
            <span class="dot"></span> SISTEMA ACTIVO
        </div>
    </header>

    <main>
        <div id="admin-panel" style="display: none;">
            <button onclick="uploadPlugin()" class="admin-btn">+ SUBIR NUEVO PLUGIN</button>
        </div>

        <section id="plugins-section">
            <h2 class="section-title">MIS PLUGINS</h2>
            <div class="card-grid">
                
                <div class="card">
                    <div class="card-body">
                        <h3>EnderShield 4.0</h3>
                        <p>Protección PaperMC 1.21.1</p>
                        <a href="plugins/EnderShield-4.0.jar" class="download-btn">DESCARGAR</a>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
