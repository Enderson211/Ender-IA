<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENDER PRESTAMISTA | CONTROL TOTAL</title>
    <style>
        :root {
            --cyan: #00f2ff;
            --blue: #0044ff;
            --dark: #00050a;
            --glass: rgba(0, 20, 40, 0.95);
            --success: #00ff88;
            --danger: #ff0044;
        }

        body {
            background: var(--dark);
            color: var(--cyan);
            font-family: 'Orbitron', sans-serif; /* Estilo futurista */
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
        }

        /* Contenedor Gigante */
        .ultra-frame {
            width: 100%;
            max-width: 1300px;
            background: var(--glass);
            border: 4px solid var(--blue);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 0 60px rgba(0, 68, 255, 0.4), inset 0 0 20px rgba(0, 242, 255, 0.1);
            position: relative;
        }

        h1 {
            text-align: center;
            font-size: 3.5rem;
            letter-spacing: 15px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--cyan);
        }

        .status-bar {
            text-align: center;
            border-bottom: 2px solid var(--blue);
            padding-bottom: 20px;
            margin-bottom: 40px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: #fff;
        }

        /* Panel Admin Grande */
        #admin-panel {
            display: none;
            background: rgba(0, 242, 255, 0.05);
            border: 2px dashed var(--cyan);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 50px;
        }

        .input-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            background: #000;
            border: 2px solid var(--blue);
            color: #fff;
            padding: 20px;
            font-size: 1.2rem;
            border-radius: 10px;
            outline: none;
        }

        input:focus { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        .btn-main {
            background: var(--cyan);
            color: #000;
            font-weight: bold;
            padding: 20px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Tabla Gigante */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px;
        }

        th {
            font-size: 1.3rem;
            padding: 20px;
            text-align: left;
            text-transform: uppercase;
            color: var(--cyan);
            border-bottom: 3px solid var(--blue);
        }

        td {
            background: rgba(0, 68, 255, 0.1);
            padding: 25px;
            font-size: 1.4rem;
            color: #fff;
        }

        td:first-child { border-radius: 15px 0 0 15px; border-left: 5px solid var(--blue); }
        td:last-child { border-radius: 0 15px 15px 0; }

        /* Estados */
        .badge {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
        }
        .pending { border: 2px solid #ffcc00; color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .paid { border: 2px solid var(--success); color: var(--success); background: rgba(0, 255, 136, 0.1); }

        .money { color: var(--success); font-weight: bold; }

        .footer {
            margin-top: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 30px;
            border-radius: 20px;
        }

        .total-box { font-size: 2rem; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="ultra-frame">
    <h1>ENDER PRESTAMISTA</h1>
    <div class="status-bar">SISTEMA CENTRAL DE PRÉSTAMOS // VALOR: Bs.VE</div>

    <div id="admin-panel">
        <h2 style="margin-top:0">➕ REGISTRAR NUEVO MOVIMIENTO</h2>
        <div class="input-group">
            <input type="text" id="nombre" placeholder="Nombre Estudiante">
            <input type="number" id="monto" placeholder="Monto Base (Bs)">
            <input type="number" id="interes" placeholder="Interés a Sumar (Bs)">
            <button class="btn-main" onclick="guardar()">CARGAR AL SISTEMA</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Estudiante</th>
                <th>Base</th>
                <th>+ Interés</th>
                <th>Total a Pagar</th>
                <th>Estado</th>
                <th class="admin-only" style="display:none">Acción</th>
            </tr>
        </thead>
        <tbody id="datos"></tbody>
    </table>

    <div class="footer">
        <div class="total-box">
            SALDO EN CALLE: <span id="total-calle" style="color:var(--cyan)">0.00</span> Bs.
        </div>
        <button onclick="toggleAdmin()" style="background:transparent; color:var(--cyan); border:2px solid var(--cyan); padding:15px; cursor:pointer; border-radius:10px;">🔑 PANEL DE CONTROL</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ender_db_v2')) || [];

    function toggleAdmin() {
        const p = document.getElementById('admin-panel');
        const isHidden = p.style.display === 'none' || p.style.display === '';
        p.style.display = isHidden ? 'block' : 'none';
        render();
    }

    function guardar() {
        const nom = document.getElementById('nombre').value;
        const base = parseFloat(document.getElementById('monto').value);
        const extra = parseFloat(document.getElementById('interes').value || 0);
        
        if (nom && !isNaN(base)) {
            const fecha = new Date().toLocaleDateString();
            const total = base + extra; // SUMA DIRECTA DE BOLOS
            db.push({ fecha, nom, base, extra, total, pagado: false });
            localStorage.setItem('ender_db_v2', JSON.stringify(db));
            document.getElementById('nombre').value = '';
            document.getElementById('monto').value = '';
            document.getElementById('interes').value = '';
            render();
        }
    }

    function borrar(idx) {
        if(confirm("¿Eliminar registro?")) {
            db.splice(idx, 1);
            localStorage.setItem('ender_db_v2', JSON.stringify(db));
            render();
        }
    }

    function pagar(idx) {
        db[idx].pagado = !db[idx].pagado;
        localStorage.setItem('ender_db_v2', JSON.stringify(db));
        render();
    }

    function render() {
        const body = document.getElementById('datos');
        const adminOn = document.getElementById('admin-panel').style.display === 'block';
        let deudaTotal = 0;
        body.innerHTML = '';

        db.forEach((p, i) => {
            if(!p.pagado) deudaTotal += p.total;
            
            body.innerHTML += `
                <tr>
                    <td>${p.fecha}</td>
                    <td>${p.nom}</td>
                    <td>${p.base.toFixed(2)}</td>
                    <td style="color:#ffcc00">+${p.extra.toFixed(2)}</td>
                    <td class="money">${p.total.toFixed(2)} Bs</td>
                    <td><span class="badge ${p.pagado ? 'paid' : 'pending'}">${p.pagado ? 'COBRADO' : 'DEBE'}</span></td>
                    ${adminOn ? `<td>
                        <button onclick="pagar(${i})" style="background:#00ff88; border:none; padding:10px; cursor:pointer; border-radius:5px; margin-right:5px;">✔</button>
                        <button onclick="borrar(${i})" style="background:#ff0044; border:none; padding:10px; color:white; cursor:pointer; border-radius:5px;">X</button>
                    </td>` : ''}
                </tr>
            `;
        });
        document.getElementById('total-calle').innerText = deudaTotal.toFixed(2);
    }
    render();
</script>

</body>
</html>
