<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENDER-IA | Neural Link PRO</title>
    <style>
        /* Diseño Hacker-Art optimizado para Infinix Smart 9 HD */
        body {
            background-color: #000;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        .terminal {
            width: 100%;
            max-width: 500px;
            background: rgba(0, 10, 0, 0.95);
            border: 2px solid #00ff41;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 15px #00ff41;
            display: flex;
            flex-direction: column;
        }
        #chat-log {
            height: 300px;
            overflow-y: auto;
            border-bottom: 1px solid #004400;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 14px;
            background: #050505;
        }
        .msg { margin-bottom: 10px; line-height: 1.3; }
        .u { color: #58a6ff; font-weight: bold; } /* Usuario en Azul */
        .i { color: #00ff41; font-weight: bold; } /* IA en Verde */
        
        .input-area {
            display: flex;
            gap: 8px;
        }
        input {
            flex-grow: 1;
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 12px;
            border-radius: 5px;
            outline: none;
            font-size: 16px; /* Evita zoom automático en Android */
        }
        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="terminal">
        <h3 style="text-align: center; margin-top: 0; letter-spacing: 2px;">🌌 ENDER-IA CORE v3.5</h3>
        <div id="chat-log">
            <div class="msg i">>>> NÚCLEO INICIALIZADO.</div>
            <div class="msg i">>>> Esperando conexión con Google Colab...</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe tu duda o cálculo..." onkeypress="if(event.key==='Enter') procesar()">
            <button onclick="procesar()">></button>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU LINK DE COLAB (Asegúrate de poner la / antes de ia)
        const ENDPOINT = "https://5000-m-s-kkb-use4a1-12wjmzf8410fh-a.us-east4-1.prod.colab.devia/";

        async function procesar() {
            const input = document.getElementById('userInput');
            const chatLog = document.getElementById('chat-log');
            const pregunta = input.value.trim();

            if (!pregunta) return;

            // Mostrar pregunta en pantalla
            chatLog.innerHTML += `<div class="msg u"><b>[USER]:</b> ${pregunta}</div>`;
            input.value = "";
            chatLog.scrollTop = chatLog.scrollHeight;

            try {
                // Enviar datos al cerebro de Google Colab
                const res = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "pregunta": pregunta })
                });

                if (!res.ok) throw new Error("Fallo en la red");

                const data = await res.json();
                
                // Mostrar respuesta inteligente
                chatLog.innerHTML += `<div class="msg i"><b>[IA]:</b> ${data.respuesta}</div>`;
            } catch (err) {
                chatLog.innerHTML += `<div class="msg" style="color:red"><b>[SISTEMA]:</b> Error de enlace. Verifica que Colab esté encendido.</div>`;
            }

            chatLog.scrollTop = chatLog.scrollHeight;
        }
    </script>
</body>
</html>
