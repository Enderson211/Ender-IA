<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENDER-IA v5.0 | Enderson211</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex-grow: 1; overflow-y: auto; border: 1px solid #00ff41; padding: 15px; background: rgba(0, 255, 65, 0.05); border-radius: 5px; margin-bottom: 10px; font-size: 14px; }
        .user-line { color: #58a6ff; margin: 5px 0; }
        .ia-line { color: #00ff41; margin: 10px 0; line-height: 1.4; border-left: 2px solid #00ff41; padding-left: 10px; }
        .system-msg { color: #ffeb3b; font-style: italic; font-size: 12px; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 12px; width: 100%; box-sizing: border-box; outline: none; border-radius: 5px; }
        .loading { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="terminal">
        <div class="system-msg">[SISTEMA]: Ender-IA v5.0 ONLINE - Creado por Enderson211</div>
        <div class="system-msg">[ESTADO]: Esperando conexión con Google Colab...</div>
    </div>

    <input type="text" id="userInput" placeholder="Escribe tu pregunta y pulsa Enter..." onkeypress="if(event.key==='Enter') enviar()">

    <script>
        // 🚨 CAMBIA ESTE LINK CADA VEZ QUE PRENDAS COLAB
        const ENDPOINT = "https://5000-m-s-2pplbp5uvrh19-c.us-east1-1.prod.colab.devia/";

        async function enviar() {
            const input = document.getElementById('userInput');
            const terminal = document.getElementById('terminal');
            const mensaje = input.value.trim();

            if (!mensaje) return;

            // Mostrar mensaje del usuario
            terminal.innerHTML += `<div class="user-line"><strong>> ${mensaje}</strong></div>`;
            input.value = "";
            
            // Efecto de carga
            const loadId = "load-" + Date.now();
            terminal.innerHTML += `<div id="${loadId}" class="ia-line loading">Ender-IA está investigando...</div>`;
            terminal.scrollTop = terminal.scrollHeight;

            try {
                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pregunta: mensaje })
                });

                const data = await response.json();
                document.getElementById(loadId).remove();
                
                // Mostrar respuesta humana generada
                terminal.innerHTML += `<div class="ia-line"><strong>ENDER-IA:</strong> ${data.respuesta}</div>`;
            } catch (error) {
                document.getElementById(loadId).innerHTML = "ERROR: El cerebro en Colab está apagado.";
                document.getElementById(loadId).classList.remove('loading');
                document.getElementById(loadId).style.color = "red";
            }
            terminal.scrollTop = terminal.scrollHeight;
        }
    </script>
</body>
</html>
