<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ender Hub | Pro</title>
    <style>
        :root {
            --bg-dark: #0b0e14;
            --accent-blue: #00e5ff;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
        }
        /* BARRA DE NAVEGACIÓN SEGURA */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid var(--accent-blue);
        }
        .nav-btn {
            background: none;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        /* CONTENEDOR DE COLORES INFINITOS */
        #color-container {
            margin-top: 70px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            padding: 10px;
        }
        .color-card {
            height: 150px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 10px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            font-size: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-card:active { transform: scale(0.95); }

        /* MODALES DE CONTRASEÑA */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        input {
            padding: 15px;
            width: 80%;
            max-width: 300px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
            text-align: center;
            font-size: 18px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <button class="nav-btn" onclick="openGate('prestamista')">E. Prestamista</button>
    <button class="nav-btn" onclick="openGate('estudio')">E. Estudio</button>
</nav>

<div id="color-container"></div>

<div id="security-modal" class="modal">
    <h2 id="modal-title">Acceso Restringido</h2>
    <input type="password" id="pass-input" placeholder="Ingresa la clave">
    <button class="nav-btn" onclick="checkPass()">Entrar</button>
    <button style="margin-top: 10px; color: red; background: none; border: none;" onclick="closeModal()">Cancelar</button>
</div>

<script>
    const container = document.getElementById('color-container');
    let currentTarget = "";
    
    // 1. GENERACIÓN DE COLORES OPTIMIZADA
    // Usamos un observer para no cargar 1 millón de colores de golpe
    function generateColors(count) {
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < count; i++) {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            const hex = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`.toUpperCase();
            
            const card = document.createElement('div');
            card.className = 'color-card';
            card.style.backgroundColor = hex;
            card.innerHTML = `<span>${hex}</span>`;
            card.onclick = () => {
                navigator.clipboard.writeText(hex);
                alert('Copiado: ' + hex);
            };
            fragment.appendChild(card);
        }
        container.appendChild(fragment);
        
        // Optimización: Si hay más de 200 elementos, borramos los primeros para liberar RAM
        if (container.children.length > 200) {
            for(let i=0; i<50; i++) container.removeChild(container.firstChild);
        }
    }

    // Carga inicial
    generateColors(40);

    // Scroll Infinito
    window.addEventListener('scroll', () => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
            generateColors(20);
        }
    });

    // 2. SISTEMA DE SEGURIDAD (Tus contraseñas)
    function openGate(type) {
        currentTarget = type;
        document.getElementById('modal-title').innerText = "Acceso a " + (type === 'prestamista' ? "Ender Prestamista" : "Ender Estudio");
        document.getElementById('security-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('security-modal').style.display = 'none';
        document.getElementById('pass-input').value = "";
    }

    function checkPass() {
        const input = document.getElementById('pass-input').value;
        
        if (currentTarget === 'prestamista') {
            if (input === "Ender_987654321") {
                window.location.href = "https://tu-pagina-web.com/prestamista"; // Pon tu link aquí
            } else {
                alert("Clave incorrecta.");
            }
        } else if (currentTarget === 'estudio') {
            if (input === "Ender-123456789") {
                window.location.href = "https://tu-pagina-web.com/estudio"; // Pon tu link aquí
            } else {
                alert("Clave incorrecta.");
            }
        }
    }
</script>

</body>
</html>
